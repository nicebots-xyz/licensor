name: Setup Licensor
description: Download a native licensor release and add it to PATH.

inputs:
  version:
    description: Licensor version to install (e.g. "v1.2.3").
    required: true
  repository:
    description: GitHub repository to download releases from (owner/repo).
    required: false
    default: nicebots-xyz/licensor

runs:
  using: composite
  steps:
    - name: Download and install licensor
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)     ASSET="licensor-${VERSION}-linux-x86_64.tar.gz" ;;
          Linux-ARM64)   ASSET="licensor-${VERSION}-linux-aarch64.tar.gz" ;;
          macOS-X64)     ASSET="licensor-${VERSION}-macos-x86_64.tar.gz" ;;
          macOS-ARM64)   ASSET="licensor-${VERSION}-macos-aarch64.tar.gz" ;;
          Windows-X64)   ASSET="licensor-${VERSION}-windows-x86_64.zip" ;;
          Windows-ARM64) ASSET="licensor-${VERSION}-windows-aarch64.zip" ;;
          *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1 ;;
        esac

        BASE_URL="https://github.com/${{ inputs.repository }}/releases/download/${VERSION}"

        curl -fsSL "${BASE_URL}/${ASSET}"       -o "${ASSET}"
        curl -fsSL "${BASE_URL}/SHA256SUMS.txt" -o SHA256SUMS.txt

        expected="$(awk -v asset="${ASSET}" '$2 == asset { print $1 }' SHA256SUMS.txt)"
        if [[ -z "$expected" ]]; then
          echo "Checksum entry not found for ${ASSET}" >&2
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "${ASSET}" | awk '{ print $1 }')"
        else
          actual="$(shasum -a 256 "${ASSET}" | awk '{ print $1 }')"
        fi

        if [[ "$actual" != "$expected" ]]; then
          echo "Checksum mismatch for ${ASSET}" >&2
          exit 1
        fi

        INSTALL_DIR="${RUNNER_TEMP:-${HOME}}/licensor"
        rm -rf "${INSTALL_DIR:?}"
        mkdir -p "${INSTALL_DIR}"

        case "${{ runner.os }}" in
          Linux|macOS)
            tar -xzf "${ASSET}" -C "${INSTALL_DIR}"
            ;;
          Windows)
            unzip -q "${ASSET}" -d "${INSTALL_DIR}"
            ;;
        esac

        echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"
