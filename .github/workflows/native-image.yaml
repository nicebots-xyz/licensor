name: Native Image
on:
  workflow_dispatch:
  push:
    tags: [ "v*.*.*" ]

jobs:
  native-image:
    name: "${{ matrix.asset_name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: licensor-x86_64-unknown-linux-gnu
            native_path: target/native-image/licensor
          - os: ubuntu-24.04-arm
            asset_name: licensor-aarch64-unknown-linux-gnu
            native_path: target/native-image/licensor
          - os: macos-15-intel
            asset_name: licensor-x86_64-apple-darwin
            native_path: target/native-image/licensor
          - os: macos-latest
            asset_name: licensor-aarch64-apple-darwin
            native_path: target/native-image/licensor
          - os: windows-latest
            asset_name: licensor-x86_64-pc-windows.exe
            native_path: target/native-image/licensor.exe
            msvc_arch: x64
          - os: windows-11-arm
            asset_name: licensor-aarch64-pc-windows.exe
            native_path: target/native-image/licensor.exe
            msvc_arch: x86_arm64

    env:
      JAVA_OPTS: -Xms2g -Xmx2g -Dfile.encoding=UTF-8

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d # v1.1.24

      - name: Setup Windows C++ toolchain
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@ced9887c29958f18f71b18c99d9eb0837859434c # v3.0.2
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build native image
        shell: bash
        run: sbt -v clean nativeImage

      - name: Stage native binary for artifact upload
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ matrix.native_path }}" "${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b54044e700ef9b7e6c2a1a0e8 # v4.6.2
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error
